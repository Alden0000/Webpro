<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulir Pendaftaran Praktikan</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            /* 2311102309_ALDEN AUDY AKBAR*/
            background: url('il_600x600.4522543678_idv5.webp') repeat;
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .form-card {
            background: rgba(255, 255, 255, 0.9); 
            border-radius: 15px;
            padding: 40px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 1px solid #ddd;
        }

        h2 {
            font-weight: 600;
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }

        .form-label {
            font-weight: 600;
            font-size: 0.9rem;
            color: #444;
        }

        .form-control, .form-select {
            border-radius: 8px;
            margin-bottom: 5px;
        }

        .btn-submit {
            background-color: #0d6efd;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
        }

        .btn-cancel {
            background-color: #f8f9fa;
            border: 1px solid #ccc;
            padding: 10px 25px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<div class="form-card">
    <h2>Formulir Pendaftaran Praktikan</h2>
    
    <form>
        <div class="row g-3">
            <div class="col-12">
                <label class="form-label">Nama :</label>
                <input type="text" class="form-control" value="Nama Lengkap Kamu">
            </div>
            <div class="col-12">
                <label class="form-label">NIM :</label>
                <input type="text" class="form-control" value="23.11.XXXX">
            </div>

            <div class="col-md-6">
                <label class="form-label">Username :</label>
                <input type="text" class="form-control" placeholder="Username">
            </div>
            <div class="col-md-6">
                <label class="form-label">Password :</label>
                <input type="password" class="form-control" placeholder="********">
            </div>

            <div class="col-12">
                <label class="form-label">Email :</label>
                <input type="email" class="form-control" placeholder="Input Email">
            </div>

            <div class="col-md-6">
                <label class="form-label d-block">Jenis Kelamin :</label>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="jk" id="p" checked>
                    <label class="form-check-label" for="p">Pria</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="jk" id="w">
                    <label class="form-check-label" for="w">Wanita</label>
                </div>
            </div>

            <div class="col-md-6">
                <label class="form-label d-block">Hobi :</label>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="checkbox" checked> Renang
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="checkbox"> Bersepeda
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="checkbox" checked> Memancing
                </div>
            </div>

            <div class="col-12">
                <label class="form-label">Jenjang Pendidikan :</label>
                <select class="form-select">
                    <option selected disabled>------Pilih------</option>
                    <option>Tamat D3</option>
                    <option>Tamat S1</option>
                    <option>Tamat S2</option>
                    <option>Tamat S3</option>
                </select>
            </div>

            <div class="col-12">
                <label class="form-label">Kritik & Saran :</label>
                <textarea class="form-control" rows="3"></textarea>
            </div>

            <div class="col-12 d-flex justify-content-end gap-2 mt-4">
                <button type="button" class="btn btn-cancel text-dark">Cancel</button>
                <button type="submit" class="btn btn-primary btn-submit">Submit</button>
            </div>
        </div>
    </form>
</div>

</body>
</html>
